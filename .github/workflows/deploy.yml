name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Deploy Backend to Production Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Set up SSH (in runner)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync backend to server (copy from runner to server)
        run: |
          rsync -az --delete --no-g \
          --exclude 'vendor/' \
          --exclude 'storage/' \
          --exclude 'bootstrap/cache/' \
          -e "ssh -i ~/.ssh/id_ed25519" \
          ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_DIR }}

      - name: Create .env from GitHub variable
        run: |
          printf '%s' "${{ vars.ENV }}" | ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.SSH_HOST }} "cat > ${{ secrets.DEPLOY_DIR }}/.env"

      - name: Create auth.json from GitHub variable
        run: |
          printf '%s' '${{ vars.AUTH_JSON }}' | ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.SSH_HOST }} "cat > ${{ secrets.DEPLOY_DIR }}/auth.json"

      - name: Run backend commands inside docker container
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DOCKER_ENV_ROOT_DIR }}
            docker compose exec -T php_backend bash -c "
            chown www-data:www-data /var/www/backend/current/.env &&
            chmod 640 /var/www/backend/current/.env &&
            composer install --no-dev --optimize-autoloader &&
            php artisan migrate --force &&
            php artisan storage:link &&
            php artisan config:clear &&
            php artisan cache:clear &&
            php artisan config:cache &&
            php artisan route:cache &&
            php artisan view:cache
            "
          EOF
